# =============================================================================
# Price Pulse — Quality Thresholds
# Used by `make quality` and the quality agent to gate PRs.
# =============================================================================

[backend]

# Cyclomatic complexity (radon CC)
# P95 of all function scores must be below this threshold.
cc_p95_max = 7

# Maintainability Index (radon MI)
# P5 of all module scores must be above this threshold (higher is better).
mi_p5_min = 10

# Halstead effort (radon HAL)
# P95 of all function effort scores must be below this threshold.
halstead_effort_p95_max = 500

# Test coverage (pytest-cov)
coverage_min_pct = 90

[frontend]

# Test coverage (vitest --coverage)
coverage_min_pct = 80

# ESLint max warnings (0 = all warnings are errors)
eslint_max_warnings = 0

[test-health]

# Intra-tier test coverage duplication — a source line covered by two or more
# test functions in the *same* tier (both tests/unit/ or both tests/integration/)
# without adding distinct assertions is waste. Cross-tier overlap is intentional
# and not counted.
#
# IMPORTANT: the count is sensitive to the runtime (the Python version changes
# coverage line attribution and which async tests run). These baselines are
# captured on the CI runtime — Python 3.12 (backend) and Node 20 (frontend) —
# because that is where the gate runs in `make quality`. Re-baseline here if the
# CI Python/Node version is bumped.
#
# Re-baselined 2026-07-12 (680 -> 739): added the /products/failing integration
# suite (tests/integration/test_products_failing_api.py). Its scenario tests each
# exercise the same route + monitoring_service query lines against real Postgres,
# which is unavoidable same-tier overlap for an endpoint that needs a live DB.
#
# Re-baselined 2026-07-15 (739 -> 757): added /products/failing pagination tests
# (same route/service lines, integration tier) and an Amazon EU-price DOM-fallback
# test (same fetch/_parse path already covered by the ld+json tests, unit tier).
#
# Re-baselined 2026-07-17 (757 -> 941): Item 15 anti-blocking. The new proxy/stealth
# test suites (test_http_client_proxy.py, test_amazon_anti_blocking.py,
# test_anti_blocking.py) each assert a *distinct* behaviour — proxy egress, rotation
# order, block-budget exhaustion, dead-proxy handling, no-proxy CAPTCHA, stealth
# context construction — but necessarily re-run the shared fetch_page /
# _fetch_via_proxy / _navigate_and_extract / _build_context execution paths, and the
# block/category integration test re-covers the /products/failing route + service
# lines. This is the "different behaviours sharing an execution path" case the gate
# re-baselines for, not net-new redundant assertions.
#
# Re-baselined 2026-07-17 frontend (1112 -> 1143): Item 18 configurable sources. The
# new ProductFormDialog test ("renders source options fetched from GET /api/v1/sources")
# asserts a *distinct* behaviour — the source <Select> is populated from the mocked
# /api/v1/sources endpoint — but necessarily re-renders the dialog, re-covering the
# shared ProductFormDialog render lines the existing dialog tests already exercise
# (unit tier). Captured on Node 20 (CI runtime).
#
# Re-baselined 2026-07-17 backend (941 -> 1096): Item 18 configurable sources. The new
# scraper suites (test_item18_scrapers) each assert a *distinct* behaviour — ld+json
# extraction, DOM fallback, timeout, block/login-wall classification — but re-run the
# shared PlaywrightScraper base fetch/_navigate/_extract paths; the preset suites
# (test_source_presets, test_source_presets_integration) re-cover the shared
# source_preset_service + registry resolution lines, and the parametrised product-create
# integration test re-covers the create_product route across four source types (the same
# "endpoint needs a live DB, each scenario re-runs the route" case already re-baselined
# for /products/failing). Captured on the CI runtime — Python 3.12 (this count is highly
# runtime-sensitive; local runs on other Python versions report a different absolute).
#
# Re-baselined 2026-07-19 frontend (1143 -> 1229): Item 17 queued-scrape visibility. The
# new Jobs-view test renders the full page (re-covering shared Card/Skeleton/Badge/table
# primitives the Dashboard/ProductDetail tests already exercise), the ScrapeJobStatusBadge
# test re-covers the shared Badge component, and the useScrapeJobs hook test re-covers the
# react-query client wiring — all distinct behaviours sharing UI/query lines the existing
# unit tests already touch, not net-new redundant assertions. Captured on Node 20 (CI).
#
# Re-baselined 2026-07-19 backend (1096 -> 1169): Item 17 queued-scrape visibility. The
# ScrapeJob signal-handler tests share execution paths within a tier — the two unit
# guard/filter tests (ignores-other-senders / missing-ids-is-noop) both re-cover the
# before_task_publish wrapper + id-extraction lines, and the two integration tests
# (publish-for-missing-product / republish-same-task-id) both re-cover the guarded sync
# upsert path — distinct behaviours (FK-swallow vs idempotent republish) sharing the same
# handler lines, the "different behaviours sharing an execution path" case the gate
# re-baselines for. Captured on the CI runtime — Python 3.12.
#
# Nudged 2026-07-20 backend (1169 -> 1173): Item 17 Copilot-review fix. Making the
# ScrapeJob upsert dialect-aware added a small `_insert_for` helper on the shared
# handle_publish path, so the several integration tests that publish a job now
# re-cover those few extra lines (integration 314 -> 318) — same shared-path case.
baseline_backend_duplicate_lines = 1173
baseline_frontend_duplicate_lines = 1229

# Enforcement ceilings (zero tolerance for net-new duplicates from this point).
# check_coverage_overlap.py / check_coverage_overlap_frontend.js exit 1 when the
# actual count exceeds these; equal-or-below passes.
max_intra_tier_duplicate_lines_backend = 1173
max_intra_tier_duplicate_lines_frontend = 1229
