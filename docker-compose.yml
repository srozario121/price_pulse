name: price-pulse

# =============================================================================
# Production-like stack
# Override with docker-compose.dev.yml for development hot-reload.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Migrate — one-shot: bring the DB schema to the Alembic head, then exit.
  # The app enforces MIGRATION_CHECK_ON_STARTUP and refuses to serve on an
  # out-of-date schema, so backend + workers wait for this to complete first.
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: price-pulse-backend:latest
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: /app/.venv/bin/alembic -c /app/alembic.ini upgrade head
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - price-pulse-net

  # ---------------------------------------------------------------------------
  # Backend — FastAPI application
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: price-pulse-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    networks:
      - price-pulse-net

  # ---------------------------------------------------------------------------
  # Celery — worker (task execution)
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: price-pulse-backend:latest
    # pool is set in celery_app.py; Celery 5.x does not accept "asyncio" as a -P shorthand
    # Full path avoids relying on PATH env expansion when exec-ing the command.
    command: /app/.venv/bin/celery -A app.workers.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    # Override the backend image's inherited HTTP HEALTHCHECK (curl :8000/health),
    # which can never pass here — workers serve no HTTP. Ping this worker's own
    # node instead ($HOSTNAME is the container id, and the default nodename is
    # celery@<hostname>). $$ escapes the compose variable so the shell expands it.
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/celery -A app.workers.celery_app inspect ping -d celery@$${HOSTNAME} -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
    networks:
      - price-pulse-net

  # ---------------------------------------------------------------------------
  # Celery — beat scheduler (periodic tasks)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: price-pulse-backend:latest
    command: /app/.venv/bin/celery -A app.workers.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    # Beat is a scheduler, not a worker — it serves no HTTP and does not answer
    # `celery inspect ping`, so the backend image's inherited :8000/health probe
    # can never pass. There is no clean liveness probe for beat; disable the
    # healthcheck rather than report a permanently-false "unhealthy". `restart:
    # unless-stopped` still recovers a crashed process.
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - price-pulse-net

  # ---------------------------------------------------------------------------
  # Celery — Playwright worker (Amazon scraping)
  # ---------------------------------------------------------------------------
  celery-playwright:
    build:
      context: .
      dockerfile: docker/celery-playwright.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - CELERY_QUEUES=playwright
    # The playwright base image ships no HEALTHCHECK; add the same worker-node
    # ping used by celery-worker so this (Amazon-critical) worker is monitored.
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/celery -A app.workers.celery_app inspect ping -d celery@$${HOSTNAME} -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    networks:
      - price-pulse-net

  # ---------------------------------------------------------------------------
  # Frontend — React SPA served via Nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    image: price-pulse-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - price-pulse-net

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 (matches testcontainers version used in integration tests)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-price_pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-price_pulse}
      POSTGRES_DB: ${POSTGRES_DB:-price_pulse}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-price_pulse} -d ${POSTGRES_DB:-price_pulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    networks:
      - price-pulse-net

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - price-pulse-net

# =============================================================================
# Networks
# =============================================================================
networks:
  price-pulse-net:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
