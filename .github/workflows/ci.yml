name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1 — Lint
  # Runs: commitlint (commit messages), ruff (Python), eslint (TypeScript)
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for commitlint to inspect commit history

      # -----------------------------------------------------------------------
      # commitlint — validate commit message format
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root Node deps (commitlint)
        run: npm ci

      - name: Run commitlint on PR commits
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

      # -----------------------------------------------------------------------
      # ruff — Python lint
      # -----------------------------------------------------------------------
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: backend

      - name: Run ruff check (backend)
        run: uv run ruff check .
        working-directory: backend

      - name: Run ruff format check (backend)
        run: uv run ruff format --check .
        working-directory: backend

      # -----------------------------------------------------------------------
      # eslint — TypeScript lint
      # -----------------------------------------------------------------------
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Run eslint (frontend)
        run: npm run lint
        working-directory: frontend

  # ===========================================================================
  # Job 2 — Backend tests
  # Runs pytest with a real Postgres service container
  # ===========================================================================
  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: price_pulse
          POSTGRES_PASSWORD: price_pulse
          POSTGRES_DB: price_pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U price_pulse -d price_pulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://price_pulse:price_pulse@localhost:5432/price_pulse_test
      DATABASE_SYNC_URL: postgresql://price_pulse:price_pulse@localhost:5432/price_pulse_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "false"
      LOG_LEVEL: WARNING

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: backend

      - name: Run pytest
        run: |
          uv run pytest \
            --tb=short \
            -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -m "not live_api"
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ===========================================================================
  # Job 3 — Frontend tests
  # Runs vitest with coverage
  # ===========================================================================
  test-frontend:
    name: Test — Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Run vitest with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ===========================================================================
  # Job 4 — Docker build
  # Builds all images on every PR (no push); uses --cache-from for speed.
  # Images are pushed to the registry only on merge to main (separate workflow).
  # ===========================================================================
  build:
    name: Build — Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: false
          tags: price-pulse-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: false
          tags: price-pulse-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ===========================================================================
  # Job 5 — Smoke test
  # Spins up the full docker-compose stack and verifies both services are healthy.
  # Runs after the build job to ensure images exist.
  # ===========================================================================
  smoke:
    name: Smoke — Full-stack health check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example .env
          # Override values that need to be valid for CI
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=ci-smoke-test-secret-key-minimum-32-chars/' .env
          sed -i 's/^DEBUG=.*/DEBUG=false/' .env
          # CORS_ORIGINS must be a JSON list (pydantic-settings v2 JSON-decodes complex fields)
          sed -i 's|^CORS_ORIGINS=.*|CORS_ORIGINS=["http://localhost"]|' .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend health (60s timeout)
        run: |
          success=false
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i * 5))s"
              success=true
              break
            fi
            echo "Attempt $i/12 — not ready, sleeping 5s..."
            sleep 5
          done
          if [ "$success" = "false" ]; then
            echo "ERROR: backend did not become healthy within 60s"
            docker compose logs backend
            exit 1
          fi

      - name: Check nginx health endpoint
        run: curl -sf http://localhost/nginx-health

      - name: Check frontend SPA shell
        run: curl -sf http://localhost/ | grep -q '<div id="root">'

      - name: Tear down stack
        if: always()
        run: docker compose down

  # ===========================================================================
  # Job 6 — Agent quality
  # Validates frontmatter completeness and referenced paths for all SDLC agents.
  # Runs in parallel with other jobs (no needs: dependency).
  # ===========================================================================
  agent-quality:
    name: Agent quality — frontmatter + path validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install all deps (creates log dirs via init-logs)
        run: |
          uv sync
          npm ci --prefix frontend
          make init-logs

      - name: Validate agent frontmatter and paths
        run: make lint-agents

  # ===========================================================================
  # Job 7 — Security scanning
  # Scans Python and Node.js dependencies for CRITICAL CVEs.
  # Runs in parallel with other jobs (no needs: dependency).
  # ===========================================================================
  security:
    name: Security — dependency CVE scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: backend

      - name: Scan Python deps for CRITICAL CVEs
        run: uv run pip-audit --fail-on CRITICAL
        working-directory: backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Scan Node.js deps for CRITICAL CVEs
        run: npm audit --audit-level=critical
        working-directory: frontend
